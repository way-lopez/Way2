
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WayLy</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="menu" class="screen active">
<h2>WayLy</h2>
<button onclick="startBattle()">Jogar</button>
<button onclick="openDeck()">Cartas</button>
</div>

<div id="battle" class="screen">
<h3 id="enemyName"></h3>

<div class="hp">
Player HP: <span id="playerHP"></span>
</div>

<div class="hp">
Enemy HP: <span id="enemyHP"></span>
</div>

<div class="energy">
Energia: <span id="energy"></span>/3
</div>

<h3>Sua mão</h3>
<div id="hand"></div>

<button onclick="endTurn()">Encerrar turno</button>
</div>

<script src="cards.js"></script>
<script src="progression.js"></script>
<script src="enemies.js"></script>
<script src="game.js"></script>

</body>
</html>
